<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - CBVP K141 Caazapá</title>

    <!-- Netlify Identity Widget (requerido para autenticación) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <style>
        /* Estilos mínimos para el admin */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 20px;
        }
        .admin-header {
            background: #B91C1C;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .admin-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .admin-header p {
            margin: 10px 0 0;
            opacity: 0.9;
        }
        .admin-link {
            display: inline-block;
            background: #111827;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }
        .admin-link:hover {
            background: #1F2937;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>CBVP K141 Caazapá</h1>
        <p>Panel de Administración del Cuartel de Bomberos</p>
    </div>

    <!-- El admin panel real de Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
