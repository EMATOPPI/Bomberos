<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Cuenta - CBVP K141</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo { width: 60px; height: 60px; margin: 0 auto 20px; }
        .logo svg { width: 100%; height: 100%; }

        h1 { color: #111827; font-size: 1.5rem; margin-bottom: 10px; }
        .subtitle { color: #6B7280; margin-bottom: 30px; line-height: 1.5; }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #B91C1C;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover { background: #991B1B; }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; }
        .message.info { background: #DBEAFE; color: #1E40AF; display: block; }

        .help-text { font-size: 0.85rem; color: #9CA3AF; margin-top: 20px; }

        /* Ocultar el widget de Netlify Identity para que no tape todo */
        #netlify-identity-widget { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="22" stroke="#B91C1C" stroke-width="3" fill="none"/>
                <path d="M24 8L28 16H20L24 8Z" fill="#B91C1C"/>
                <rect x="20" y="16" width="8" height="16" rx="2" fill="#B91C1C"/>
                <rect x="18" y="32" width="12" height="4" rx="1" fill="#B91C1C"/>
                <circle cx="24" cy="24" r="4" fill="#DC2626"/>
            </svg>
        </div>

        <h1>CBVP K141 Caazapá</h1>
        <p class="subtitle">Confirmá tu cuenta para acceder al panel de administración</p>

        <div id="message" class="message"></div>

        <button class="btn" id="open-login">Iniciar Sesión / Crear Cuenta</button>

        <p class="help-text" id="help-text">Si já recibiste el email de invitación, hacé clic en el botón de arriba.</p>
    </div>

    <!-- Netlify Identity Widget - AGREGAR AL FINAL -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
        const messageEl = document.getElementById('message');
        const helpText = document.getElementById('help-text');
        const loginBtn = document.getElementById('open-login');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        // Cuando el usuario hace clic en el botón, abrir el widget de Netlify Identity
        loginBtn.addEventListener('click', () => {
            window.netlifyIdentity.open();
        });

        // Netlify Identity maneja todo el flujo:
        // - Si viene con confirmation_token: procesa la confirmación
        // - Si no: muestra pantalla de login/registro
        window.netlifyIdentity.on('init', user => {
            if (user) {
                // Usuario ya logueado - ir al admin
                showMessage('Sesión activa. Redirigiendo al panel...', 'success');
                setTimeout(() => window.location.href = '/admin', 1000);
            } else {
                // No hay usuario logueado
                // Verificar si hay un token de confirmación en el hash
                const hash = window.location.hash;
                if (hash.includes('confirmation_token')) {
                    // El widget de Netlify Identity procesa automáticamente el token
                    showMessage('Procesando invitación...', 'info');
                    helpText.textContent = 'Por favor esperá mientras se confirma tu cuenta.';
                } else {
                    showMessage('Iniciá sesión o creá una cuenta nueva.', 'info');
                    helpText.textContent = 'Si no tenés cuenta, pedí una invitación al administrador del sitio.';
                }
            }
        });

        // Cuando el usuario confirma exitosamente
        window.netlifyIdentity.on('signup', user => {
            console.log('Signup event:', user);
            showMessage('Cuenta creada. Redirigiendo...', 'success');
            setTimeout(() => window.location.href = '/admin', 1000);
        });

        // Cuando el usuario inicia sesión
        window.netlifyIdentity.on('login', user => {
            console.log('Login event:', user);
            showMessage('Sesión iniciada. Redirigiendo...', 'success');
            // Ir al admin y cerrar el widget
            window.netlifyIdentity.close();
            setTimeout(() => window.location.href = '/admin', 500);
        });

        // Manejar errores
        window.netlifyIdentity.on('error', err => {
            console.error('Identity error:', err);
            showMessage('Error: ' + (err.message || 'Algo salió mal'), 'error');
        });
    </script>
</body>
</html>
