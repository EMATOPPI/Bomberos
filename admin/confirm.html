<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Cuenta - CBVP K141</title>

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            color: #111827;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6B7280;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #B91C1C;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #B91C1C;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #991B1B;
        }

        .btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            display: block;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
            display: block;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-loading .spinner {
            display: inline-block;
        }

        .btn-loading .btn-text {
            display: none;
        }

        .help-text {
            font-size: 0.85rem;
            color: #9CA3AF;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="confirm-container">
        <!-- Logo BOMBEROS -->
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="22" stroke="#B91C1C" stroke-width="3" fill="none"/>
                <path d="M24 8L28 16H20L24 8Z" fill="#B91C1C"/>
                <rect x="20" y="16" width="8" height="16" rx="2" fill="#B91C1C"/>
                <rect x="18" y="32" width="12" height="4" rx="1" fill="#B91C1C"/>
                <circle cx="24" cy="24" r="4" fill="#DC2626"/>
            </svg>
        </div>

        <h1>CBVP K141 Caazapá</h1>
        <p class="subtitle">Creá tu contraseña para acceder al panel de administración</p>

        <div id="message" class="message"></div>

        <form id="signup-form">
            <div class="form-group">
                <label for="email">Tu Email</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 8 caracteres" minlength="8">
            </div>

            <button type="submit" class="btn" id="submit-btn">
                <span class="spinner"></span>
                <span class="btn-text">Crear Mi Cuenta</span>
            </button>
        </form>

        <p class="help-text" id="help-text">Procesando invitación...</p>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const messageEl = document.getElementById('message');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const helpText = document.getElementById('help-text');

        // Mostrar mensaje
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }

        // Obtener token del hash URL
        function getToken() {
            const hash = window.location.hash;
            const match = hash.match(/confirmation_token=([^&]+)/);
            return match ? match[1] : null;
        }

        // Obtener email del hash (a veces viene incluido)
        function getEmailFromHash() {
            const hash = window.location.hash;
            const match = hash.match(/email=([^&]+)/);
            if (match) {
                return decodeURIComponent(match[1]);
            }
            return null;
        }

        // Inicializar Netlify Identity
        window.netlifyIdentity.on('init', user => {
            const token = getToken();
            const emailFromHash = getEmailFromHash();

            if (user) {
                // Ya logueado - redirigir al admin
                showMessage('Sesión activa. Redirigiendo al panel...', 'success');
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);
                return;
            }

            if (token) {
                helpText.textContent = 'Enlace de invitación detectado. Completá los datos para crear tu cuenta.';

                // Si hay email en el hash, pre-llenar
                if (emailFromHash) {
                    emailInput.value = emailFromHash;
                }

                // El widget de Netlify Identity maneja la confirmación del token
                // Solo necesitamos mostrar el formulario
            } else {
                helpText.textContent = 'No se detectó enlace de invitación. Asegurate de hacer clic en el enlace del email.';
                showMessage('Enlace de invitación inválido o expirado.', 'error');
            }
        });

        // Manejar envío del formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const token = getToken();

            if (!email || !password) {
                showMessage('Por favor completá todos los campos.', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('La contraseña debe tener al menos 8 caracteres.', 'error');
                return;
            }

            // Mostrar estado de carga
            submitBtn.disabled = true;
            submitBtn.classList.add('btn-loading');

            try {
                // Netlify Identity confirma el usuario y crea la contraseña
                const response = await fetch('/.netlify/identity/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        email: email,
                        password: password
                    })
                });

                if (response.ok) {
                    showMessage('¡Cuenta creada exitosamente! Redirigiendo...', 'success');

                    // Esperar y luego redirigir al admin
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1500);
                } else {
                    const data = await response.json();
                    showMessage(data.message || 'Error al crear la cuenta. Intentá de nuevo.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('btn-loading');
                }
            } catch (error) {
                console.error('Error:', error);

                // Como fallback, abrir el widget de Netlify Identity
                try {
                    window.netlifyIdentity.open();
                } catch (e) {
                    showMessage('Error de conexión. Probá de nuevo o contactá al administrador.', 'error');
                }

                submitBtn.disabled = false;
                submitBtn.classList.remove('btn-loading');
            }
        });
    </script>
</body>
</html>
