backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "config"
    label: "Configuración del Sitio"
    label_singular: "Configuración"
    files:
      - name: "config"
        label: "Datos del Cuartel"
        file: "data/config.json"
        fields:
          - label: "Nombre del Cuartel"
            name: "nombre"
            widget: "string"
          - label: "Nombre Completo"
            name: "nombreCompleto"
            widget: "string"
          - label: "Año de Fundación"
            name: "fundacion"
            widget: "number"
          - label: "Dirección del Cuartel"
            name: "direccion"
            widget: "string"
          - label: "Ciudad"
            name: "ciudad"
            widget: "string"
          - label: "País"
            name: "pais"
            widget: "string"
            default: "Paraguay"

  - name: "contacto"
    label: "Datos de Contacto"
    label_singular: "Contacto"
    files:
      - name: "contacto"
        label: "Teléfonos y Emails"
        file: "data/config.json"
        fields:
          - label: "Teléfono de Emergencias"
            name: "telefonoEmergencias"
            widget: "string"
          - label: "Teléfono Central"
            name: "telefonoCentral"
            widget: "string"
          - label: "Email Institucional"
            name: "emailInstitucional"
            widget: "string"
          - label: "Email Personal"
            name: "emailPersonal"
            widget: "string"

  - name: "donaciones"
    label: "Datos para Donaciones"
    label_singular: "Datos Bancarios"
    files:
      - name: "donaciones"
        label: "Cuenta Bancaria"
        file: "data/config.json"
        fields:
          - label: "Banco"
            name: "banco"
            widget: "string"
          - label: "Tipo de Cuenta"
            name: "tipoCuenta"
            widget: "select"
            options: ["Cuenta Corriente", "Cuenta de Ahorro"]
          - label: "Número de Cuenta / CBU"
            name: "numeroCuenta"
            widget: "string"
          - label: "Nombre del Titular"
            name: "nombreTitular"
            widget: "string"
          - label: "RUC de la Organización"
            name: "ruc"
            widget: "string"
          - label: "Moneda"
            name: "moneda"
            widget: "select"
            options: ["PYG", "USD", "ARS"]
            default: "PYG"
          - label: "Observaciones"
            name: "observaciones"
            widget: "text"
            required: false

  - name: "redes"
    label: "Redes Sociales"
    label_singular: "Red Social"
    files:
      - name: "redes"
        label: "Redes Sociales"
        file: "data/config.json"
        fields:
          - label: "Facebook"
            name: "facebook"
            widget: "string"
            required: false
          - label: "Instagram"
            name: "instagram"
            widget: "string"
            required: false
          - label: "Twitter / X"
            name: "twitter"
            widget: "string"
            required: false
          - label: "YouTube"
            name: "youtube"
            widget: "string"
            required: false

  - name: "comandante"
    label: "Datos del Comandante"
    label_singular: "Comandante"
    files:
      - name: "comandante"
        label: "Comandante"
        file: "data/config.json"
        fields:
          - label: "Nombre del Comandante"
            name: "nombre"
            widget: "string"
          - label: "Teléfono del Comandante"
            name: "telefono"
            widget: "string"
            required: false

  - name: "news"
    label: "Noticias"
    label_singular: "Noticia"
    folder: "data/news"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
      - label: "Fecha"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "Resumen"
        name: "excerpt"
        widget: "string"
      - label: "Contenido"
        name: "content"
        widget: "markdown"
      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
      - label: "Autor"
        name: "author"
        widget: "string"
        default: "CBVP K141 Caazapá"
      - label: "Publicada"
        name: "published"
        widget: "boolean"
        default: true